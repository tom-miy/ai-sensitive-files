# Minimal policy template.
# path: plaintext path to hide/check.
# encrypted_path: encrypted artifact path.
# decrypted_path: local plaintext output path after decryption.
sensitive_files:
  - path: ".env"
    encrypted_path: ".env.sops.yaml"
    decrypted_path: ".env"
    reason: "local environment secrets"
    tags: ["env", "secret"]
    crypto:
      method: "sops-age"
      recipients: ["age1exampleteampublickey00000000000000000000000000000000000", "age1examplecipublickey000000000000000000000000000000000000"]
      encrypt_command: "sops --encrypt --output {encrypted_path} {decrypted_path}"
      decrypt_command: "sops --decrypt --output {decrypted_path} {encrypted_path}"
      manual_edit: "decrypted"
    action:
      aiignore: true
      gitignore: true
      encrypt: true
      commit_block: true
